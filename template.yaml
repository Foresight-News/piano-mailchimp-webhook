AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Export Piano subscribers to CSV in S3.

Parameters:
  SecretId:
    Type: String
    Default: piano-mailchimp-webhook/production
    Description: AWS Secrets Manager secret containing Piano and export settings.
  SecretRegion:
    Type: String
    Default: eu-west-1
    Description: AWS region where the Secrets Manager secret is stored.

Globals:
  Function:
    Runtime: python3.12
    Architectures:
      - arm64
    Timeout: 300
    MemorySize: 256
    Environment:
      Variables:
        S3_BUCKET: !Ref SubscriberExportBucket
        SECRET_ID: !Ref SecretId
        SECRET_REGION: !Ref SecretRegion

Resources:
  SubscriberExportBucket:
    Type: AWS::S3::Bucket

  PianoSubscriberExportFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/piano-subscriber-exporter/
      Handler: app.lambda_handler
      Policies:
        - S3WritePolicy:
            BucketName: !Ref SubscriberExportBucket
        - AWSSecretsManagerGetSecretValuePolicy:
            SecretArn: !Sub arn:${AWS::Partition}:secretsmanager:${SecretRegion}:${AWS::AccountId}:secret:${SecretId}*

Outputs:
  SubscriberExportBucketName:
    Description: Bucket where subscriber CSV exports are written.
    Value: !Ref SubscriberExportBucket
  PianoSubscriberExportFunctionName:
    Description: Piano subscriber export Lambda function name.
    Value: !Ref PianoSubscriberExportFunction
