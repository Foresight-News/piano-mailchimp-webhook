AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Export Piano subscribers to CSV in S3 and sync them to Mailchimp.

Parameters:
  SecretId:
    Type: String
    Default: piano-mailchimp-webhook/production
    Description: AWS Secrets Manager secret containing Piano and export settings.
  SecretRegion:
    Type: String
    Default: eu-west-1
    Description: AWS region where the Secrets Manager secret is stored.

Globals:
  Function:
    Runtime: python3.12
    Architectures:
      - arm64
    Timeout: 300
    MemorySize: 256
    Environment:
      Variables:
        SECRET_ID: !Ref SecretId
        SECRET_REGION: !Ref SecretRegion

Resources:
  SubscriberExportBucket:
    Type: AWS::S3::Bucket

  SubscriberMailchimpSyncDeadLetterQueue:
    Type: AWS::SQS::Queue

  SubscriberMailchimpSyncQueue:
    Type: AWS::SQS::Queue
    Properties:
      VisibilityTimeout: 1800
      RedrivePolicy:
        deadLetterTargetArn: !GetAtt SubscriberMailchimpSyncDeadLetterQueue.Arn
        maxReceiveCount: 3

  PianoSubscriberExportFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/piano-subscriber-exporter/
      Handler: app.lambda_handler
      Environment:
        Variables:
          S3_BUCKET: !Ref SubscriberExportBucket
      Events:
        NightlySubscriberExport:
          Type: Schedule
          Properties:
            Description: Run the Piano subscriber export every night at 1am GMT.
            Schedule: cron(0 1 * * ? *)
            Enabled: true
      Policies:
        - S3WritePolicy:
            BucketName: !Ref SubscriberExportBucket
        - AWSSecretsManagerGetSecretValuePolicy:
            SecretArn: !Sub arn:${AWS::Partition}:secretsmanager:${SecretRegion}:${AWS::AccountId}:secret:${SecretId}*

  PianoSubscriberMailchimpSyncFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/piano-subscriber-mailchimp-syncer/
      Handler: app.lambda_handler
      Environment:
        Variables:
          SYNC_QUEUE_URL: !Ref SubscriberMailchimpSyncQueue
          SYNC_BATCH_SIZE: 10
      Events:
        SubscriberCsvCreated:
          Type: S3
          Properties:
            Bucket: !Ref SubscriberExportBucket
            Events: s3:ObjectCreated:*
            Filter:
              S3Key:
                Rules:
                  - Name: prefix
                    Value: piano/subscribers/
                  - Name: suffix
                    Value: .csv
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - s3:GetObject
              Resource: !Sub arn:${AWS::Partition}:s3:::*/piano/subscribers/*.csv
        - SQSSendMessagePolicy:
            QueueName: !GetAtt SubscriberMailchimpSyncQueue.QueueName
        - AWSSecretsManagerGetSecretValuePolicy:
            SecretArn: !Sub arn:${AWS::Partition}:secretsmanager:${SecretRegion}:${AWS::AccountId}:secret:${SecretId}*

  PianoSubscriberMailchimpSyncWorkerFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/piano-subscriber-mailchimp-syncer/
      Handler: app.worker_handler
      ReservedConcurrentExecutions: 2
      Environment:
        Variables:
          MAILCHIMP_CONNECT_TIMEOUT_SECONDS: 2
          MAILCHIMP_READ_TIMEOUT_SECONDS: 5
          MAILCHIMP_MAX_RETRIES: 3
          MAILCHIMP_RETRY_DELAY_SECONDS: 1
      Events:
        SubscriberSyncBatchQueued:
          Type: SQS
          Properties:
            Queue: !GetAtt SubscriberMailchimpSyncQueue.Arn
            BatchSize: 1
            ScalingConfig:
              MaximumConcurrency: 2
      Policies:
        - SQSPollerPolicy:
            QueueName: !GetAtt SubscriberMailchimpSyncQueue.QueueName
        - AWSSecretsManagerGetSecretValuePolicy:
            SecretArn: !Sub arn:${AWS::Partition}:secretsmanager:${SecretRegion}:${AWS::AccountId}:secret:${SecretId}*

Outputs:
  SubscriberExportBucketName:
    Description: Bucket where subscriber CSV exports are written.
    Value: !Ref SubscriberExportBucket
  PianoSubscriberExportFunctionName:
    Description: Piano subscriber export Lambda function name.
    Value: !Ref PianoSubscriberExportFunction
  PianoSubscriberMailchimpSyncFunctionName:
    Description: Piano subscriber CSV batch dispatcher Lambda function name.
    Value: !Ref PianoSubscriberMailchimpSyncFunction
  PianoSubscriberMailchimpSyncWorkerFunctionName:
    Description: Piano subscriber batch to Mailchimp sync worker Lambda function name.
    Value: !Ref PianoSubscriberMailchimpSyncWorkerFunction
  SubscriberMailchimpSyncQueueUrl:
    Description: Queue where subscriber sync batches are written.
    Value: !Ref SubscriberMailchimpSyncQueue
